<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rose Briefing</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=editorial-light-7" />
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="brand"><span class="dot"></span>Rose Briefing <span class="sub">/ AI 资讯</span></div>
        <nav>
          <a href="#" id="nav-latest">最新</a>
          <a href="#" id="nav-official">官方</a>
          <a href="https://github.com/Rosetears520/rose-briefing" target="_blank" rel="noopener noreferrer">源码</a>
        </nav>
      </div>

      <header class="masthead">
        <p class="kicker" id="kicker">Rose Briefing</p>
        <h1>每一天的 AI,<br />值得一读的部分。</h1>
        <p class="lead">从官方公告、高质量专栏到全网热点与 X 上的声音——收拢成一份可搜索的简报，安静地等你来读。</p>
        <div class="byline">
          <span><b id="item-count">--</b> 条资讯</span>
          <span id="coverage-line">加载中</span>
          <span id="generated-at">加载中</span>
          <button id="coverage-detail-toggle" class="detail-link" type="button">覆盖详情 →</button>
        </div>
      </header>

      <section id="coverage-detail" class="coverage-detail" hidden aria-label="覆盖详情">
        <div class="coverage-detail-inner">
          <div class="coverage-detail-head">
            <strong id="coverage-detail-title">覆盖详情</strong>
            <button id="coverage-detail-close" class="detail-close" type="button">收起</button>
          </div>
          <div id="coverage-detail-list" class="coverage-detail-list"></div>
        </div>
      </section>

      <section class="resources" aria-label="外部资源">
        <div class="res-row">
          <span class="res-tag">服务状态</span>
          <a class="res-card" style="background:#eef3ff;border-color:#c3d2fd" href="https://status.deepseek.com/" target="_blank" rel="noopener noreferrer">
            <span class="rc-dot" style="background:#4d6bfe"></span>
            <span>DeepSeek</span>
            <span class="rc-arr">↗</span>
          </a>
          <a class="res-card" style="background:#ecfdf7;border-color:#a7f3d4" href="https://status.openai.com/" target="_blank" rel="noopener noreferrer">
            <span class="rc-dot" style="background:#10a37f"></span>
            <span>OpenAI</span>
            <span class="rc-arr">↗</span>
          </a>
          <a class="res-card" style="background:#fef4f1;border-color:#fed7cc" href="https://status.claude.com/" target="_blank" rel="noopener noreferrer">
            <span class="rc-dot" style="background:#d97757"></span>
            <span>Claude</span>
            <span class="rc-arr">↗</span>
          </a>

          <span class="res-sep" aria-hidden="true"></span>

          <span class="res-tag">赛博黄历</span>
          <a class="res-card" style="background:#eef0ff;border-color:#d4d8ff" href="https://marginlab.ai/trackers/codex/" target="_blank" rel="noopener noreferrer">
            <span class="rc-dot" style="background:#4f46e5"></span>
            <span>Codex</span>
            <span class="rc-arr">↗</span>
          </a>
          <a class="res-card" style="background:#f5f0ff;border-color:#ddd2f7" href="https://marginlab.ai/trackers/claude-code/" target="_blank" rel="noopener noreferrer">
            <span class="rc-dot" style="background:#7c3aed"></span>
            <span>Claude Code</span>
            <span class="rc-arr">↗</span>
          </a>
        </div>
      </section>

      <section class="bar" aria-label="搜索和过滤">
        <div class="row">
          <div class="range" id="range-filter" role="group" aria-label="时间范围">
            <button type="button" class="range-btn on" data-range="24h">24h</button>
            <button type="button" class="range-btn" data-range="7d">7d</button>
          </div>
          <label class="search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg>
            <input id="search" type="search" placeholder="搜索关键词、站点、发布方、话题…" autocomplete="off" />
          </label>
          <select id="sort-order" class="sel" aria-label="排序">
            <option value="newest">最新优先</option>
            <option value="score">分数优先</option>
            <option value="publisher">发布方</option>
          </select>
        </div>
        <div class="row row-filters">
          <select id="channel-filter" class="sel" aria-label="渠道">
            <option value="all">全部渠道</option>
          </select>
          <select id="site-filter" class="sel" aria-label="站点">
            <option value="all">全部站点</option>
          </select>
          <select id="publisher-filter" class="sel" aria-label="发布方">
            <option value="all">全部发布方</option>
          </select>
          <select id="topic-filter" class="sel" aria-label="话题">
            <option value="all">全部话题</option>
          </select>
        </div>
        <div class="chips" id="family-filter" role="group" aria-label="内容家族"></div>
      </section>

      <p class="status" id="status" aria-live="polite">正在加载数据…</p>
      <section class="list" id="cards" aria-label="资讯列表"></section>
    </div>

    <script type="module" src="app.js?v=editorial-light-7"></script>
  </body>
</html>
